name: keep-render-awake

# Render's free tier sleeps after ~15 min idle, causing a slow cold start
# (and a 502 through the Vercel proxy) on the next visit. Ping the health
# endpoint every ~10 minutes so the service stays warm during the day.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -fsS --max-time 90 https://weatherv2-api.onrender.com/api/health \
            && echo " — backend awake" \
            || echo "ping failed (will retry next run)"
