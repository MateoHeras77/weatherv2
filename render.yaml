# Render Blueprint (infrastructure as code) for the Weatherv2 backend.
# The service is also created via the Render CLI; this file documents and
# reproduces that configuration.
services:
  - type: web
    name: weatherv2-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
